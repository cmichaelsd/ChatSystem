name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Ensure terraform is valid
  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Initialize
        working-directory: ChatInfra/environments/dev
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ChatInfra/environments/dev
        run: terraform validate

  # If terraform is valid check terraform formatting
  terraform-format:
    name: Terraform Format
    runs-on: ubuntu-latest
    needs: [terraform-validate]

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Check formatting
        working-directory: ChatInfra/environments/dev
        run: terraform fmt -recursive -check

  # If terraform format is valid check server formatting
  chat-server-format:
    name: ChatServer Format
    runs-on: ubuntu-latest
    needs: [terraform-format]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Check formatting
        working-directory: ChatServer
        run: ./gradlew ktlintCheck

  # If terraform formet is vaild check api tests
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: [terraform-format]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            ApiServer/requirements.txt
            ApiServer/requirements-dev.txt

      - name: Install dependencies
        working-directory: ApiServer
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        working-directory: ApiServer
        run: python -m pytest

  # If terraform format is valid check presence tests
  presence-tests:
    name: Presence Tests
    runs-on: ubuntu-latest
    needs: [terraform-format]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            PresenceServer/requirements.txt
            PresenceServer/requirements-dev.txt

      - name: Install dependencies
        working-directory: PresenceServer
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        working-directory: PresenceServer
        run: python -m pytest

  # If chatserver format is valid check chatserver tests
  chat-server-tests:
    name: Chat Server Tests
    runs-on: ubuntu-latest
    needs: [chat-server-format]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Run tests
        working-directory: ChatServer
        run: ./gradlew test