services:

  apiserver:
    build: .
    ports:
      - "8001:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chatsystem

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chatsystem
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d chatsystem"]
      interval: 5s
      retries: 5
    networks:
      - chatsystem

networks:
  chatsystem:
    external: true
