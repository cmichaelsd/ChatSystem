services:

  presenceserver:
    build: .
    ports:
      - "8002:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chatsystem

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks:
      - chatsystem

networks:
  chatsystem:
    external: true
